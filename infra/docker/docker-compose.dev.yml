version: '3.8'

services:
  backend:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.backend.dev
    container_name: bolao-backend-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ../../backend:/app/backend
      - ../../package.json:/app/package.json
      - ../../.env.local:/app/.env.local
      - /app/node_modules
    env_file:
      - ../../.env.local
    environment:
      - PORT=3001

  frontend:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.frontend.dev
    container_name: bolao-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ../../src:/app/src
      - ../../public:/app/public
      - ../../vite.config.ts:/app/vite.config.ts
      - ../../tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
